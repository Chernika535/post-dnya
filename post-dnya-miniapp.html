<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FFFFFF">
<title>Пост дня</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #FFFFFF;
  --bg2: #F6F5F3;
  --text: #1A1A1A;
  --text2: #7A7672;
  --text3: #B0AAA2;
  --accent: #C0392B;
  --accent-soft: #FAF0EE;
  --card: #FFFFFF;
  --border: #E9E6E1;
  --tag-bg: #F3F1ED;
  --tag-text: #8C857C;
  --done-bg: #FDF6EE;
  --done-border: #E8D9C4;
  --done-text: #A68B5B;
  --green: #2D8659;
  --green-bg: #EDF7F1;
  --radius: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100vh; height: 100dvh;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Cormorant Garamond', Georgia, serif;
  -webkit-font-smoothing: antialiased;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh; height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  width: 100%;
  padding: 0 16px;
  padding-top: env(safe-area-inset-top, 8px);
  padding-bottom: env(safe-area-inset-bottom, 8px);
}

/* ─── Header ─── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0 8px;
  flex-shrink: 0;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-icon {
  width: 22px; height: 22px;
  background: var(--accent);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #fff;
  font-weight: 700;
  transform: rotate(-3deg);
}

.stats-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  background: var(--bg2);
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}

/* ─── Controls ─── */
.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
  flex-shrink: 0;
}

.control {
  position: relative;
}

.control-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text3);
  margin-bottom: 3px;
}

.control select {
  width: 100%;
  appearance: none;
  -webkit-appearance: none;
  background: var(--bg2);
  border: 1.5px solid transparent;
  border-radius: 10px;
  padding: 9px 30px 9px 12px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  outline: none;
}

.control select:focus { border-color: var(--accent); background: #fff; }

.control::after {
  content: '⌄';
  position: absolute;
  right: 12px;
  bottom: 10px;
  font-size: 14px;
  color: var(--text3);
  pointer-events: none;
  font-weight: 700;
}

/* ─── Action row ─── */
.action-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  flex-shrink: 0;
}

.btn-main {
  flex: 1;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 13px 16px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: -0.3px;
}

.btn-main:active { transform: scale(0.97); opacity: 0.9; }

.btn-dice {
  width: 48px;
  background: var(--bg2);
  border: none;
  border-radius: 12px;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}

.btn-dice:active { transform: scale(0.93); }

/* ─── Result card ─── */
.result {
  flex: 1;
  min-height: 0;
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  margin-bottom: 6px;
}

.result.has-content { background: var(--card); border: 1.5px solid var(--border); }

.result-accent-line {
  position: absolute;
  top: 0; left: 20px; right: 20px;
  height: 2px;
  background: var(--accent);
  border-radius: 0 0 2px 2px;
  opacity: 0;
  transition: opacity 0.3s;
}

.result.has-content .result-accent-line { opacity: 1; }

/* done banner */
.done-flag {
  display: none;
  align-items: center;
  gap: 6px;
  background: var(--done-bg);
  border: 1px dashed var(--done-border);
  border-radius: 8px;
  padding: 5px 11px;
  margin-bottom: 8px;
  flex-shrink: 0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3px;
  color: var(--done-text);
}

.done-flag.show { display: flex; }

/* tags */
.result-meta {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 10px;
  flex-shrink: 0;
}

.pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
}

.pill-type { background: var(--accent-soft); color: var(--accent); }
.pill-niche { background: var(--tag-bg); color: var(--tag-text); }
.pill-angle { background: var(--green-bg); color: var(--green); }

/* question */
.result-body {
  flex: 1;
  display: flex;
  align-items: center;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.result-body .question {
  font-size: 20px;
  line-height: 1.5;
  font-weight: 400;
  color: var(--text);
  letter-spacing: -0.2px;
}

.result-body .placeholder {
  color: var(--text3);
  font-style: italic;
  font-size: 16px;
  line-height: 1.6;
}

/* footer */
.result-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  gap: 6px;
}

.result-actions-left {
  display: flex;
  gap: 6px;
}

.btn-sm {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.4px;
  color: var(--text2);
  background: var(--bg2);
  border: none;
  border-radius: 8px;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn-sm:active { transform: scale(0.95); }
.btn-sm.copied { background: var(--green-bg); color: var(--green); }
.btn-sm.is-done { background: var(--done-bg); color: var(--done-text); }

.counter {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  flex-shrink: 0;
}

/* ─── Animations ─── */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.result.animate .result-body .question {
  animation: slideUp 0.35s ease-out;
}

/* ─── Compact screens ─── */
@media (max-height: 600px) {
  .header { padding: 6px 0; }
  .controls { margin-bottom: 6px; gap: 6px; }
  .control select { padding: 7px 26px 7px 10px; font-size: 13px; }
  .action-row { margin-bottom: 6px; }
  .btn-main { padding: 10px 14px; font-size: 15px; }
  .result { padding: 12px 14px; }
  .result-body .question { font-size: 17px; }
}
</style>
</head>

<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">П</div>
      Пост дня
    </div>
    <div class="stats-pill" id="statsPill">0 написано</div>
  </div>

  <div class="controls">
    <div class="control">
      <div class="control-label">Ниша</div>
      <select id="nicheSelect"><option value="random">🎲 Любая</option></select>
    </div>
    <div class="control">
      <div class="control-label">Формат</div>
      <select id="formatSelect"><option value="random">🎲 Любой</option></select>
    </div>
  </div>

  <div class="action-row">
    <button class="btn-main" id="btnGo">Получить задание</button>
    <button class="btn-dice" id="btnDice">🎲</button>
  </div>

  <div class="result" id="resultCard">
    <div class="result-accent-line"></div>
    <div class="done-flag" id="doneFlag">📌 Уже было — зайди с другой стороны</div>
    <div class="result-meta" id="resultMeta"></div>
    <div class="result-body" id="resultBody">
      <p class="placeholder">Здесь появится задание — тема, формат и ракурс, который заставит написать по-настоящему</p>
    </div>
    <div class="result-actions" id="resultActions" style="display:none">
      <div class="result-actions-left">
        <button class="btn-sm" id="btnCopy">КОПИРОВАТЬ</button>
        <button class="btn-sm" id="btnDone">✓ НАПИСАНО</button>
      </div>
      <span class="counter" id="counter"></span>
    </div>
  </div>

</div>

// ─── Selects ───
const nicheSelect = document.getElementById('nicheSelect');
const formatSelect = document.getElementById('formatSelect');

Object.keys(NICHES).forEach(n => {
  const o = document.createElement('option');
  o.value = n; o.textContent = n;
  nicheSelect.appendChild(o);
});

FORMATS.forEach(f => {
  const o = document.createElement('option');
  o.value = f; o.textContent = f;
  formatSelect.appendChild(o);
});

// ─── Date ───
const now = new Date();

// ─── Utils ───
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ─── Done tracking (localStorage) ───
const STORAGE_KEY = 'postday_done';
function getDone() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveDone(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
function isDone(q) { return getDone().includes(q); }
function markDone(q) { const a = getDone(); if (!a.includes(q)) { a.push(q); saveDone(a); } }
function unmarkDone(q) { saveDone(getDone().filter(x => x !== q)); }

function updateStats() {
  const count = getDone().length;
  document.getElementById('statsPill').textContent = `${count} написано`;
}
updateStats();

// ─── Generate ───
let genCount = 0;
let currentQuestion = '';

function generate() {
  const format = formatSelect.value === 'random' ? pick(FORMATS) : formatSelect.value;
  const nicheName = nicheSelect.value === 'random' ? pick(Object.keys(NICHES)) : nicheSelect.value;
  const question = pick(NICHES[nicheName]);
  currentQuestion = question;
  genCount++;

  const card = document.getElementById('resultCard');
  card.classList.add('has-content');
  card.classList.remove('animate');
  void card.offsetWidth;
  card.classList.add('animate');

  document.getElementById('resultMeta').innerHTML =
    `<span class="pill pill-type">${format}</span>` +
    `<span class="pill pill-niche">${nicheName}</span>`;

  document.getElementById('resultBody').innerHTML = `<p class="question">${question}</p>`;
  document.getElementById('resultActions').style.display = 'flex';
  document.getElementById('counter').textContent = `#${genCount}`;

  // done state
  const flag = document.getElementById('doneFlag');
  const btnD = document.getElementById('btnDone');
  if (isDone(question)) {
    flag.classList.add('show');
    btnD.textContent = '↩ СНЯТЬ';
    btnD.classList.add('is-done');
  } else {
    flag.classList.remove('show');
    btnD.textContent = '✓ НАПИСАНО';
    btnD.classList.remove('is-done');
  }

  const btnC = document.getElementById('btnCopy');
  btnC.classList.remove('copied');
  btnC.textContent = 'КОПИРОВАТЬ';

  // haptic
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

document.getElementById('btnGo').addEventListener('click', generate);

document.getElementById('btnDice').addEventListener('click', () => {
  nicheSelect.value = 'random';
  formatSelect.value = 'random';
  generate();
});

// ─── Done toggle ───
document.getElementById('btnDone').addEventListener('click', () => {
  if (!currentQuestion) return;
  const flag = document.getElementById('doneFlag');
  const btnD = document.getElementById('btnDone');
  if (isDone(currentQuestion)) {
    unmarkDone(currentQuestion);
    flag.classList.remove('show');
    btnD.textContent = '✓ НАПИСАНО';
    btnD.classList.remove('is-done');
  } else {
    markDone(currentQuestion);
    flag.classList.add('show');
    btnD.textContent = '↩ СНЯТЬ';
    btnD.classList.add('is-done');
  }
  updateStats();
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
});

// ─── Copy ───
document.getElementById('btnCopy').addEventListener('click', () => {
  const format = document.querySelector('.pill-type')?.textContent || '';
  const niche = document.querySelector('.pill-niche')?.textContent || '';
  const question = document.querySelector('.result-body .question')?.textContent || '';

  const text = `📝 ЗАДАНИЕ НА ПОСТ\n\nФормат: ${format}\nНиша: ${niche}\n\nТема: ${question}`;

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = 'ГОТОВО ✓';
    btn.classList.add('copied');
    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    setTimeout(() => { btn.textContent = 'КОПИРОВАТЬ'; btn.classList.remove('copied'); }, 2000);
  });
});
</script>
</body>
</html>
